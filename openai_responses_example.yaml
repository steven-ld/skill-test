cli:
  # 兼容保留：当 openai.enabled=false 时继续走本地 Claude/Codex CLI
  command: claude
  base_args:
    - "--print"
    - "--dangerously-skip-permissions"
  timeout: 1000

openai:
  enabled: true
  # 推荐通过环境变量注入，不要把真实密钥写进 YAML
  api_key_env: OPENAI_API_KEY
  # 如果你接的是兼容 Responses API 的网关，可以在这里填 base_url
  base_url: ""
  # 可按成本/效果自行替换；这是一个偏 coding 的默认值
  model: gpt-5.3-codex
  api_mode: responses
  timeout: 1000
  # 新接入优先推荐 shell；如果要兼容 codex-mini-latest 工作流，可改成 local_shell
  tool_type: shell
  store: false
  reasoning_effort: medium
  max_tool_rounds: 12
  shell_timeout_ms: 120000
  max_output_chars: 16000

git:
  author_name: "AI Skill Tester"
  author_email: "skill-test@local"
  base_branch: main
  branch_prefix: skill-test
  auto_push: false
  cleanup_on_finish: true

retry:
  max_retries: 1
  retry_on_timeout: true
  retry_on_failure: false
  timeout_increment_on_timeout: 300

max_workers: 1
output_dir: results

report_formats:
  - text
  - json
  - markdown

tasks:
  - id: user-count-api
    name: "查询用户数量接口"
    mode: coding
    prompt: |
      实现一个查询所有用户数量的接口，需求如下：
      1. 需要鉴权（使用项目现有的鉴权方式）
      2. 使用 Redis 缓存数据，10 分钟有效期
      3. 只统计 deleted = 0 的用户（未删除的用户）
      4. 在 cloud-member 模块中实现
      5. 使用 MyBatis-Plus 查询
      6. 遵循项目现有的分层和代码风格
      7. 必须复用已有的 Controller / Service / Repository，不要创建新的类

skills:
  - name: baseline
    tool: builtin
    origin: builtin
    description: "OpenAI Responses API 基线组"
